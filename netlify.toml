[build]
  command = "npm ci --legacy-peer-deps && npm run build"
  publish = "dist"
  functions = "api"
  ignore = "git diff --quiet HEAD^ HEAD -- '*.md' 'public/*' '!public/_redirects'"

[build.environment]
  NPM_CONFIG_PRODUCTION = "false"
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"

[context.production.environment]
  VITE_API_URL = "https://ecromrrealestate.onrender.com"

[context.deploy-preview.environment]
  VITE_API_URL = "/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
